assistant:
  name: "Sweetie"
  user_name: "Aadish"
  log_level: "INFO"
  proactive_suggestions: false
  conversation_window_seconds: 20
  exit_phrases: ["that's all", "go to sleep", "thanks sweetie", "nevermind"]

wake_word:
  # Using openWakeWord's built-in "hey_jarvis" as a placeholder for Phase 1.
  phrase: "hey_jarvis"
  threshold: 0.5

tts:
  # Choose which voice to use. (Make sure you've run scripts/download_models.py)
  # Options: "en_US-lessac-low" (Female), "en_US-ryan-low" (Male)
  voice: "en_US-lessac-low"
  
  # Speed modifier (Piper's length_scale). < 1.0 is faster, > 1.0 is slower.
  speed: 1.0
  
  # Adds a pause (in seconds) between sentences for natural cadence
  sentence_silence: 0.2

stt:
  model_size: "small" # Using 'small' for CPU speed, per requirements
  compute_type: "int8"
  listen_timeout: 6 # Stop listening if no speech is heard for 6 seconds
  phrase_limit: 15 # Max duration for a single command in seconds

gui:
  dock_width: 320
  dock_height: 140
  dash_width: 400
  dash_height: 600

ollama:
  host: "http://localhost:11434"
  model: "llama3.2:3b" # Default to 3B model for fast CPU inference

apps:
  notepad: "notepad.exe"
  calculator: "calc.exe"
  browser: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
  spotify: "C:\\Users\\aadis\\AppData\\Roaming\\Spotify\\Spotify.exe"
  code: "C:\\Users\\aadis\\AppData\\Local\\Programs\\Microsoft VS Code\\Code.exe"

safety:
  require_confirm: true # Ask before batch operations or modifying registry

screenshot:
  save_directory: "screenshots" # Will be resolved relative to sweetie dir if not absolute
  format: "png" # Options: png, jpeg, bmp

files:
  search_directories:
    - "C:\\Users\\aadis\\Documents"
    - "C:\\Users\\aadis\\Downloads"
    - "C:\\Users\\aadis\\Desktop"
    - "C:\\Users\\aadis\\OneDrive\\Documents"
    - "C:\\Users\\aadis\\OneDrive\\Desktop"
  auto_organize_confirm: true
